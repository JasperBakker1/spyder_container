name: Image builder

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  schedule:
    - cron: '0 3 1-7 * SAT'
  push:
    branches: [ "master" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "master" ]

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}
  stage1: base
  stage2: machine-learning
  stage3: wavefront-shaping

  
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Aggressive cleanup
        run: |
          # Remove JVM, .NET, Swift, Azure, Julia, Android, chromium, Google, Powershell and clean up Docker
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/julia*
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /opt/microsoft /opt/google
          sudo rm -rf /opt/az
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /opt/hostedtoolcache


      - name: Check free space
        run: |
          echo "Free space:"
          df -h
      
      - name: convert repo name to lower case
        run: echo "REPO=${GITHUB_REPOSITORY@L}" >> "${GITHUB_ENV}"

      - name: Checkout repository
        uses: actions/checkout@v6

      # Install the cosign tool except on PR
      # https://github.com/sigstore/cosign-installer
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 #v4.1.2
        with:
          cosign-release: 'v2.2.4'

      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}


      - name: Build and push (${{ env.stage1 }})
        id: build-base
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ env.stage1 }}
          cache-from: type=local,src=/tmp/runner/docker-cache
          cache-to: type=local,dest=/tmp/runner/docker-cache,mode=max
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}:${{ env.stage1 }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Sign ${{ env.stage1 }} image
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.REPO }}@${{ steps.build-base.outputs.digest }}

      - name: Build and push (${{ env.stage2 }})
        id: build-ml
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ env.stage2 }}
          cache-from: type=local,src=/tmp/runner/docker-cache
          cache-to: type=local,dest=/tmp/runner/docker-cache,mode=max
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}:${{ env.stage2 }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Sign ${{ env.stage2 }} image
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.REPO }}@${{ steps.build-base.outputs.digest }}

      - name: Build and push (${{ env.stage3 }})
        id: build-wfs
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ env.stage3 }}
          cache-from: type=local,src=/tmp/runner/docker-cache
          cache-to: type=local,dest=/tmp/runner/docker-cache,mode=max
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}:${{ env.stage3 }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Sign ${{ env.stage3 }} image
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.REPO }}@${{ steps.build-base.outputs.digest }}